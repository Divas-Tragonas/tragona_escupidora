name: 📝 Transcriure Sessió D&D

on:
  workflow_dispatch:
    inputs:
      vod_url:
        description: "URL del VOD de Twitch"
        required: true
        type: string
      titol:
        description: "Títol de la sessió (opcional)"
        required: false
        default: ""
        type: string
      idioma:
        description: "Idioma de l'àudio"
        required: false
        default: "ca"
        type: choice
        options:
          - ca
          - es
          - en
          - fr
          - de
          - pt
          - it

jobs:
  transcriure:
    name: Transcriure VOD amb AssemblyAI
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Clonar repositori
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Instalar dependències Python
        run: pip install -r scripts/requirements.txt

      - name: Preparar cookies de YouTube (opcional)
        if: ${{ secrets.YTDLP_COOKIES != '' }}
        run: |
          echo "${{ secrets.YTDLP_COOKIES }}" > /tmp/yt_cookies.txt
          echo "YTDLP_COOKIES_FILE=/tmp/yt_cookies.txt" >> $GITHUB_ENV

      - name: Transcriure sessió
        id: transcriure
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
        run: |
          python scripts/generate_recap.py \
            --url    "${{ github.event.inputs.vod_url }}" \
            --titol  "${{ github.event.inputs.titol }}" \
            --idioma "${{ github.event.inputs.idioma }}" \
            --salida docs/transcripts

      - name: Publicar transcripció
        run: |
          git config user.name  "Cronista de la Masmorra"
          git config user.email "actions@github.com"

          git add docs/transcripts/ docs/transcripts.json

          if git diff --staged --quiet; then
            echo "Cap canvi per commitear."
            exit 0
          fi

          FECHA=$(date +"%Y-%m-%d")
          git commit -m "📝 Nova transcripció: ${FECHA}"
          git push origin master

      - name: Notificar transcripció llesta
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          FECHA=$(date +"%Y-%m-%d")
          TITOL="${{ github.event.inputs.titol }}"
          if [ -z "$TITOL" ]; then TITOL="Sessió del ${FECHA}"; fi

          # Buscar el fitxer de transcripció generat
          TRANSCRIPT_FILE=$(find docs/transcripts -name "${FECHA}*.txt" | head -1)
          RAW_URL="https://raw.githubusercontent.com/${REPO}/master/${TRANSCRIPT_FILE}"
          WIZARD_URL="https://${OWNER}.github.io/${REPO_NAME}/"

          gh issue create \
            --repo "$REPO" \
            --title "📝 Transcripció llesta: ${TITOL}" \
            --body "La transcripció de **${TITOL}** ja és disponible.

          **Pròxim pas:**
          1. Obre el fitxer de transcripció, selecciona-ho tot i copia-ho
          2. Ves al wizard → Nova Sessió → Pas 2 → pestanya **Enganxar transcripció**
          3. Pega la transcripció i segueix els passos per generar el recap amb Claude

          📄 **Fitxer de transcripció (copia el contingut):**
          \`${TRANSCRIPT_FILE}\`
          👉 [Obrir fitxer raw](${RAW_URL})

          🌐 **Wizard:** ${WIZARD_URL}

          🎥 **VOD:** ${{ github.event.inputs.vod_url }}

          ---
          *Transcrit automàticament per GitHub Actions el ${FECHA}*" \
            --label "recap" 2>/dev/null || true
