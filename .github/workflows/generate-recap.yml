name: 📜 Generar Recap D&D

# Es dispara manualment des de la web (via API) o des de la pestanya Actions de GitHub
on:
  workflow_dispatch:
    inputs:
      vod_url:
        description: "URL del VOD de Twitch"
        required: true
        type: string
      titulo:
        description: "Títol de la sessió (opcional — es genera automàticament si es deixa buit)"
        required: false
        default: ""
        type: string
      idioma:
        description: "Idioma de l'àudio per a Rev.ai"
        required: false
        default: "ca"
        type: choice
        options:
          - ca
          - es
          - en
          - fr
          - de
          - pt
          - it

jobs:
  generar-recap:
    name: Generar recap des de VOD
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      # ── 1. Clonar el repositori ───────────────────────────────────────
      - name: Clonar repositori
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Configurar Python ─────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      # ── 3. Instalar ffmpeg (necessari per yt-dlp) ─────────────────────
      - name: Instalar ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      # ── 4. Instalar dependències Python ───────────────────────────────
      - name: Instalar dependències Python
        run: pip install -r scripts/requirements.txt

      # ── 5. Executar el generador de recap ─────────────────────────────
      - name: Generar recap
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
        run: |
          python scripts/generate_recap.py \
            --url "${{ github.event.inputs.vod_url }}" \
            --titulo "${{ github.event.inputs.titulo }}" \
            --idioma "${{ github.event.inputs.idioma }}" \
            --salida docs/recaps

      # ── 6. Commit i push ──────────────────────────────────────────────
      - name: Publicar recap a GitHub Pages
        run: |
          git config user.name  "Cronista de la Masmorra"
          git config user.email "actions@github.com"

          git add docs/recaps/ docs/recaps.json

          if git diff --staged --quiet; then
            echo "No hi ha canvis. El recap potser ja existia."
            exit 0
          fi

          FECHA=$(date +"%Y-%m-%d")
          git commit -m "📜 Nou recap: ${FECHA}"
          git push origin master

      # ── 7. Notificació quan el recap és llest ─────────────────────────
      - name: Notificar recap llest
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          FECHA=$(date +"%Y-%m-%d")
          TITOL="${{ github.event.inputs.titulo }}"
          if [ -z "$TITOL" ]; then TITOL="Sessió del ${FECHA}"; fi

          gh issue create \
            --repo "$REPO" \
            --title "✅ Recap llest: ${TITOL}" \
            --body "El recap de la sessió **${TITOL}** s'ha generat i publicat.

          📖 **Ves al lloc:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

          🎥 **VOD:** ${{ github.event.inputs.vod_url }}

          ---
          *Generat automàticament per GitHub Actions el ${FECHA}*" \
            --label "recap" 2>/dev/null || true
